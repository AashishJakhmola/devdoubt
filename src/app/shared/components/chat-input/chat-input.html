<div class="chat-input-bar">
    <textarea class="chat-input-bar__field" placeholder="Type your doubt..."
        [formControl]="messageControl" (keydown)="onKeyDown($event)" rows="1" #textareaRef></textarea>
    <button class="chat-input-bar__send" [disabled]="messageControl.invalid" (click)="onSend($event)"
        aria-label="Send message">
        <i class="ti ti-send" aria-hidden="true"></i>
    </button>
</div>
