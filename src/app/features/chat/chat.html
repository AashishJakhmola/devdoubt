<div class="chat-screen">

    <!-- Overlay for mobile sidebar -->
    <div class="chat-sidebar__overlay" [class.is-visible]="isSidebarOpen" (click)="toggleSidebar()">
    </div>

    <aside class="chat-sidebar" [class.is-open]="isSidebarOpen">
        <div class="chat-sidebar__header">
            <div class="chat-sidebar__logo">
                <i class="ti ti-message-2" aria-hidden="true"></i>
            </div>
            <p class="chat-sidebar__brand">DevDoubt</p>
        </div>

        <nav class="chat-sidebar__nav">
            <a class="chat-sidebar__link chat-sidebar__link--active" (click)="closeSidebar()">
                <i class="ti ti-messages" aria-hidden="true"></i>
                Ask a question
            </a>
            <a class="chat-sidebar__link" (click)="closeSidebar()">
                <i class="ti ti-history" aria-hidden="true"></i>
                Past doubts
            </a>
            <a class="chat-sidebar__link" (click)="closeSidebar()">
                <i class="ti ti-chart-bar" aria-hidden="true"></i>
                Team dashboard
            </a>
        </nav>

        <div class="chat-sidebar__footer">
            <div class="chat-sidebar__user">
                <div class="chat-sidebar__user-avatar">AJ</div>
                <div>
                    <p class="chat-sidebar__user-name">Aashish</p>
                    <p class="chat-sidebar__user-role">Developer</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="chat-main">

        <div class="chat-main__header">
            <!-- Hamburger button — only visible on mobile -->
            <button class="chat-sidebar__toggle" (click)="toggleSidebar()" aria-label="Toggle sidebar">
                <i class="ti ti-menu-2" aria-hidden="true"></i>
            </button>
            <i class="ti ti-messages" aria-hidden="true"></i>
            <span>Ask a question</span>
        </div>

        <div class="chat-main__messages" #messagesContainer>
            @for (message of store.messages(); track message.id) {
            <app-message-bubble [message]="message" />
            } @empty {
            <p class="chat-main__empty">No messages yet. Ask your first question!</p>
            }

            @if (store.isAiTyping()) {
            <div class="chat-main__typing-wrapper">
                <div class="message-row__avatar message-row__avatar--ai">
                    <i class="ti ti-robot" aria-hidden="true"></i>
                </div>
                <div class="typing-indicator">
                    <span class="typing-indicator__dot"></span>
                    <span class="typing-indicator__dot"></span>
                    <span class="typing-indicator__dot"></span>
                </div>
            </div>
            }
        </div>

        <app-chat-input (sent)="onMessageSent($event)" />

    </main>

</div>
